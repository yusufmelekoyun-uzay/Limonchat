<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Limonchat</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>

<style>

body{

margin:0;
background:#111;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;

}

h1{

font-size:52px;
margin-top:15px;
margin-bottom:8px;

text-shadow:
0 0 25px yellow;

}

.container{

position:relative;

width:92%;
max-width:520px;

margin:auto;

padding:10px;

border-radius:35px;

background:
rgba(255,255,255,0.05);

border:
2px solid rgba(255,255,0,0.2);

box-shadow:
0 0 35px rgba(255,255,0,0.2);

}

video,
canvas{

width:100%;
border-radius:28px;

}

video{

display:block;

}

canvas{

position:absolute;

left:10px;
top:10px;

width:calc(100% - 20px);
height:calc(100% - 20px);

pointer-events:none;

}



/* SNAPCHAT BUTONU */

#btn{

position:absolute;

left:50%;
bottom:18px;

transform:translateX(-50%);

z-index:50;

width:82px;
height:82px;

border-radius:50%;

border:
6px solid white;

background:
rgba(255,255,255,0.15);

backdrop-filter:blur(5px);

font-size:0;

box-shadow:
0 0 18px rgba(255,255,255,0.6);

}



/* KAMERA DEĞİŞTİR */

#switchCam{

position:absolute;

top:18px;
right:18px;

z-index:60;

width:62px;
height:62px;

border-radius:50%;

border:
4px solid white;

background:
rgba(255,255,255,0.15);

backdrop-filter:blur(5px);

font-size:28px;

color:white;

box-shadow:
0 0 18px rgba(255,255,255,0.4);

}



/* YAZILAR */

.info{

margin-top:85px;
margin-bottom:14px;

opacity:0.8;

}

.log{

font-size:18px;
margin-bottom:10px;

}

</style>

</head>

<body>

<h1>Limonchat 🐤🍋</h1>

<div class="container">

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas"></canvas>

<button id="btn"></button>

<button id="switchCam">

🔄

</button>

</div>

<div class="info">

🐤 Ağzını açınca kuş sesi çıkar 🍋

</div>

<div
class="log"
id="log">

🐤 Başlatılıyor...

</div>

<script>

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const log =
document.getElementById("log");



// KUŞ SESİ

const birdSound =
new Audio(
"freesound_community-cardinal-37075.mp3"
);

birdSound.preload =
"auto";

birdSound.volume =
1;





// SES AKTİF

document.body.onclick = async ()=>{

try{

await birdSound.play();

birdSound.pause();

birdSound.currentTime = 0;

log.innerHTML =
"🔊 Ses aktif";

}catch(e){}

};





// KUŞ FOTO

const limon =
new Image();

let kusHazir = false;



limon.onload = ()=>{

kusHazir = true;

};



limon.src =
"28630-removebg-preview.png";





// KAMERA

let currentFacing =
"user";

let currentStream;



async function startCamera(){



if(currentStream){

currentStream
.getTracks()
.forEach(track=>track.stop());

}



currentStream =

await navigator.mediaDevices.getUserMedia({

video:{
facingMode:currentFacing
},

audio:false

});



video.srcObject =
currentStream;



await video.play();



log.innerHTML =
"📸 Kamera açıldı";

}



startCamera();





// KAMERA DEĞİŞTİR

async function switchCamera(){

currentFacing =

currentFacing === "user"
? "environment"
: "user";



await startCamera();

}



document
.getElementById("switchCam")
.onclick = switchCamera;





// FACEMESH

const faceMesh =
new FaceMesh({

locateFile:(file)=>{

return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;

}

});



faceMesh.setOptions({

maxNumFaces:1,

refineLandmarks:true,

minDetectionConfidence:0.5,

minTrackingConfidence:0.5

});



faceMesh.onResults(onResults);





// SÜREKLİ ÇALIŞ

async function renderFace(){

if(video.readyState >= 2){

await faceMesh.send({
image:video
});

}



requestAnimationFrame(renderFace);

}



video.onloadeddata = ()=>{

renderFace();

};







function onResults(results){

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(

results.image,

0,
0,

canvas.width,
canvas.height

);





if(results.multiFaceLandmarks.length > 0){

const face =
results.multiFaceLandmarks[0];





// YÜZ

const faceCenter =
face[1];

const fx =
faceCenter.x * canvas.width;

const fy =
faceCenter.y * canvas.height;



const faceSize =

Math.abs(
face[10].y - face[152].y
)

* canvas.height;





// SARI YÜZ

ctx.fillStyle =
"rgba(255,230,0,0.40)";

ctx.beginPath();

ctx.ellipse(

fx,
fy + 5,

faceSize * 0.42,
faceSize * 0.58,

0,

0,
Math.PI * 2

);

ctx.fill();





// YAN ÇİZGİLER

ctx.strokeStyle =
"rgba(0,0,0,0.22)";

ctx.lineWidth =
3;



for(let i = 0; i < 5; i++){

ctx.beginPath();

ctx.moveTo(

fx - faceSize * 0.16,

fy - faceSize * 0.08 + i * faceSize * 0.05

);

ctx.lineTo(

fx - faceSize * 0.35,

fy - faceSize * 0.12 + i * faceSize * 0.03

);

ctx.stroke();

}



for(let i = 0; i < 5; i++){

ctx.beginPath();

ctx.moveTo(

fx + faceSize * 0.16,

fy - faceSize * 0.08 + i * faceSize * 0.05

);

ctx.lineTo(

fx + faceSize * 0.35,

fy - faceSize * 0.12 + i * faceSize * 0.03

);

ctx.stroke();

}





// ALIN ÇİZGİLERİ

for(let i = 0; i < 4; i++){

ctx.beginPath();

ctx.moveTo(

fx - faceSize * 0.12 + i * faceSize * 0.08,

fy - faceSize * 0.42

);

ctx.lineTo(

fx - faceSize * 0.08 + i * faceSize * 0.08,

fy - faceSize * 0.18

);

ctx.stroke();

}





// GAGA

const nose =
face[1];

const nx =
nose.x * canvas.width;

const ny =
nose.y * canvas.height;



ctx.fillStyle =
"#d89b2b";

ctx.beginPath();

ctx.moveTo(
nx - 25,
ny
);

ctx.quadraticCurveTo(
nx,
ny - 35,
nx + 25,
ny
);

ctx.quadraticCurveTo(
nx,
ny + 20,
nx - 25,
ny
);

ctx.fill();



ctx.fillStyle =
"#8a5a10";

ctx.beginPath();

ctx.moveTo(
nx - 18,
ny + 5
);

ctx.lineTo(
nx + 18,
ny + 5
);

ctx.lineTo(
nx,
ny + 65
);

ctx.fill();



// BURUN DELİKLERİ

ctx.fillStyle =
"rgba(0,0,0,0.45)";

ctx.beginPath();

ctx.arc(
nx - 8,
ny + 1,
3,
0,
Math.PI*2
);

ctx.fill();



ctx.beginPath();

ctx.arc(
nx + 8,
ny + 1,
3,
0,
Math.PI*2
);

ctx.fill();





// GÖZLER

const leftEye =
face[33];

const rightEye =
face[263];

const lx =
leftEye.x * canvas.width + 10;

const ly =
leftEye.y * canvas.height;

const rx =
rightEye.x * canvas.width - 10;

const ry =
rightEye.y * canvas.height;



ctx.fillStyle =
"white";

ctx.beginPath();

ctx.arc(
lx,
ly,
24,
0,
Math.PI*2
);

ctx.fill();



ctx.beginPath();

ctx.arc(
rx,
ry,
24,
0,
Math.PI*2
);

ctx.fill();



ctx.fillStyle =
"black";

ctx.beginPath();

ctx.arc(
lx,
ly,
18,
0,
Math.PI*2
);

ctx.fill();



ctx.beginPath();

ctx.arc(
rx,
ry,
18,
0,
Math.PI*2
);

ctx.fill();





// AĞIZ

const upperLip =
face[13];

const lowerLip =
face[14];

const mouthOpen =

Math.abs(
upperLip.y - lowerLip.y
);





// KUŞ SESİ

if(mouthOpen > 0.03){

if(birdSound.paused){

birdSound.currentTime = 0;

birdSound.play().catch(()=>{});

log.innerHTML =
"🐤 Cik cik cik 🔊";

}

}else{

if(!birdSound.paused){

birdSound.pause();

birdSound.currentTime = 0;

}

}





// OMUZ KUŞU

const shoulder =
face[454];

let sx =
shoulder.x * canvas.width + 40;

let sy =
shoulder.y * canvas.height + 85;



if(kusHazir){

ctx.drawImage(

limon,

sx - 40,
sy - 75,

125,
125

);

}

}

}





// FOTOĞRAF

document
.getElementById("btn")
.onclick = ()=>{

const a =
document.createElement("a");

a.href =
canvas.toDataURL();

a.download =
"limonchat.png";

a.click();

log.innerHTML =
"📸 Fotoğraf kaydedildi";

};

</script>

</body>

</html>
