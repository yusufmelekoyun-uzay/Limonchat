<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Limonchat</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>

body{

margin:0;
background:#111;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;

}

h1{

font-size:52px;
margin-top:15px;
margin-bottom:8px;

text-shadow:
0 0 25px yellow;

}

.container{

position:relative;

width:92%;
max-width:520px;

margin:auto;

padding:10px;

border-radius:35px;

background:
rgba(255,255,255,0.05);

border:
2px solid rgba(255,255,0,0.2);

box-shadow:
0 0 35px rgba(255,255,0,0.2);

}

video,
canvas{

width:100%;
border-radius:28px;

}

canvas{

position:absolute;

left:10px;
top:10px;

width:calc(100% - 20px);
height:calc(100% - 20px);

}

button{

margin-top:4px;

margin-bottom:8px;

padding:14px 45px;

font-size:34px;
font-weight:bold;

background:
linear-gradient(
45deg,
yellow,
orange
);

border:none;

border-radius:22px;

box-shadow:
0 0 30px rgba(255,255,0,0.5);

}

.info{

margin-top:10px;
margin-bottom:14px;

opacity:0.8;

}

.log{

font-size:18px;
margin-bottom:10px;

}

</style>

</head>

<body>

<h1>Limonchat 🐤🍋</h1>

<div class="container">

<video
id="video"
autoplay
playsinline>
</video>

<canvas id="canvas"></canvas>

</div>

<button id="btn">

ÇEK 📸

</button>

<div class="info">

🐤 Ağzını açınca kuş sesi çıkar 🍋

</div>

<div
class="log"
id="log">

🐤 Başlatılıyor...

</div>

<script>

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const log =
document.getElementById("log");



// KUŞ SESİ

const birdSound =
new Audio("bird.mp3");

birdSound.preload =
"auto";

birdSound.volume =
1;





// SES İZNİ

document.body.onclick = ()=>{

birdSound.play();

birdSound.pause();

birdSound.currentTime = 0;

log.innerHTML =
"🔊 Ses aktif";

};





// KUŞ FOTO

const limon =
new Image();

let kusHazir = false;



limon.onload = ()=>{

kusHazir = true;

console.log("🐤 Kuş yüklendi");

log.innerHTML =
"🐤 Kuş yüklendi";

};



limon.onerror = ()=>{

log.innerHTML =
"❌ Kuş resmi bulunamadı";

};



limon.src =
"28630-removebg-preview.png";





// KAMERA

navigator.mediaDevices
.getUserMedia({

video:true,
audio:true

})

.then((stream)=>{

video.srcObject =
stream;

log.innerHTML =
"📸 Kamera açıldı";

})

.catch(()=>{

log.innerHTML =
"❌ Kamera açılamadı";

});





// FACEMESH

const faceMesh =
new FaceMesh({

locateFile:(file)=>{

return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;

}

});



faceMesh.setOptions({

maxNumFaces:1,

refineLandmarks:true,

minDetectionConfidence:0.5,

minTrackingConfidence:0.5

});



faceMesh.onResults(onResults);





// CAMERA

const camera =
new Camera(video,{

onFrame: async ()=>{

await faceMesh.send({
image:video
});

},

width:640,

height:480

});

camera.start();







function onResults(results){

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(

results.image,

0,
0,

canvas.width,
canvas.height

);





if(results.multiFaceLandmarks.length > 0){

const face =
results.multiFaceLandmarks[0];





// YÜZ

const faceCenter =
face[1];

const fx =
faceCenter.x * canvas.width;

const fy =
faceCenter.y * canvas.height;



const faceSize =

Math.abs(
face[10].y - face[152].y
)

* canvas.height;





// SARI YÜZ

ctx.fillStyle =
"rgba(255,230,0,0.40)";

ctx.beginPath();

ctx.ellipse(

fx,
fy + 5,

faceSize * 0.42,
faceSize * 0.58,

0,

0,
Math.PI * 2

);

ctx.fill();





// YAN ÇİZGİLER

ctx.strokeStyle =
"rgba(0,0,0,0.22)";

ctx.lineWidth =
3;



for(let i = 0; i < 5; i++){

ctx.beginPath();

ctx.moveTo(

fx - faceSize * 0.16,

fy - faceSize * 0.08 + i * faceSize * 0.05

);

ctx.lineTo(

fx - faceSize * 0.35,

fy - faceSize * 0.12 + i * faceSize * 0.03

);

ctx.stroke();

}





for(let i = 0; i < 5; i++){

ctx.beginPath();

ctx.moveTo(

fx + faceSize * 0.16,

fy - faceSize * 0.08 + i * faceSize * 0.05

);

ctx.lineTo(

fx + faceSize * 0.35,

fy - faceSize * 0.12 + i * faceSize * 0.03

);

ctx.stroke();

}





// ALIN ÇİZGİLERİ

for(let i = 0; i < 4; i++){

ctx.beginPath();

ctx.moveTo(

fx - faceSize * 0.12 + i * faceSize * 0.08,

fy - faceSize * 0.42

);

ctx.lineTo(

fx - faceSize * 0.08 + i * faceSize * 0.08,

fy - faceSize * 0.18

);

ctx.stroke();

}





// GAGA

const nose =
face[1];

const nx =
nose.x * canvas.width;

const ny =
nose.y * canvas.height;



ctx.fillStyle =
"#d89b2b";

ctx.beginPath();

ctx.moveTo(
nx - 25,
ny
);

ctx.quadraticCurveTo(
nx,
ny - 35,
nx + 25,
ny
);

ctx.quadraticCurveTo(
nx,
ny + 20,
nx - 25,
ny
);

ctx.fill();



ctx.fillStyle =
"#8a5a10";

ctx.beginPath();

ctx.moveTo(
nx - 18,
ny + 5
);

ctx.lineTo(
nx + 18,
ny + 5
);

ctx.lineTo(
nx,
ny + 40
);

ctx.fill();





// GÖZLER

const leftEye =
face[33];

const rightEye =
face[263];

const lx =
leftEye.x * canvas.width + 10;

const ly =
leftEye.y * canvas.height;

const rx =
rightEye.x * canvas.width - 10;

const ry =
rightEye.y * canvas.height;



ctx.fillStyle =
"white";

ctx.beginPath();

ctx.arc(
lx,
ly,
24,
0,
Math.PI*2
);

ctx.fill();



ctx.beginPath();

ctx.arc(
rx,
ry,
24,
0,
Math.PI*2
);

ctx.fill();



ctx.fillStyle =
"black";

ctx.beginPath();

ctx.arc(
lx,
ly,
18,
0,
Math.PI*2
);

ctx.fill();



ctx.beginPath();

ctx.arc(
rx,
ry,
18,
0,
Math.PI*2
);

ctx.fill();





// AĞIZ

const upperLip =
face[13];

const lowerLip =
face[14];

const mouthOpen =

Math.abs(
upperLip.y - lowerLip.y
);





// KUŞ SESİ

if(mouthOpen > 0.03){

if(birdSound.paused){

birdSound.volume = 1;

birdSound.currentTime = 0;

birdSound.play().catch(()=>{});

log.innerHTML =
"🐤 Cik cik cik 🔊";

}

}else{

if(!birdSound.paused){

birdSound.pause();

birdSound.currentTime = 0;

}

}





// OMUZ KUŞU

const shoulder =
face[454];

let sx =
shoulder.x * canvas.width + 40;

let sy =
shoulder.y * canvas.height + 85;



if(sx < 0){

sx = 50;

}

if(sx > canvas.width){

sx = canvas.width - 50;

}



if(sy < 0){

sy = 50;

}

if(sy > canvas.height){

sy = canvas.height - 50;

}





if(

sx > -100 &&
sx < canvas.width + 100 &&
sy > -100 &&
sy < canvas.height + 100

){

if(kusHazir){

log.innerHTML =
"🐤 Kuş görünüyor";

ctx.drawImage(

limon,

sx - 40,
sy - 75,

125,
125

);

}

}else{

log.innerHTML =
"❌ Kuş görünmüyor";

}

}

}





// FOTOĞRAF

document
.getElementById("btn")
.onclick = ()=>{

const a =
document.createElement("a");

a.href =
canvas.toDataURL();

a.download =
"limonchat.png";

a.click();

log.innerHTML =
"📸 Fotoğraf kaydedildi";

};

</script>

</body>

</html>
